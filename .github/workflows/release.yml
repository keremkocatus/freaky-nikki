name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Publish (self-contained)
        run: >
          dotnet publish src/FreakyNikki/FreakyNikki.csproj
          -c Release -r win-x64 --self-contained true
          -o publish

      - name: Build installer + update packages
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          # Pull previous releases so Velopack can produce delta updates (first
          # release has none — ignore the failure).
          vpk download github --repoUrl "${{ github.server_url }}/${{ github.repository }}" --token "${{ secrets.GITHUB_TOKEN }}" 2>$null
          vpk pack `
            --packId FreakyNikki `
            --packVersion $version `
            --packDir publish `
            --mainExe FreakyNikki.exe `
            --packTitle "Freaky Nikki" `
            --icon src/FreakyNikki/Assets/app.ico

      # Uploads the installer + update packages to a DRAFT GitHub release for
      # review. Add --publish here (or click "Publish" on GitHub) to go live;
      # the auto-updater only sees published releases.
      - name: Upload draft GitHub release
        shell: pwsh
        run: |
          vpk upload github `
            --repoUrl "${{ github.server_url }}/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --releaseName "Freaky Nikki ${{ github.ref_name }}" `
            --tag "${{ github.ref_name }}"
